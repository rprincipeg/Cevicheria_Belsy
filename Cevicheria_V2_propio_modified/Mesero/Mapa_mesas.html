<script>
(function () {
  if (!CB.protectPage(["mesero", "admin"])) return;
  document.querySelectorAll('button, a').forEach(function (el) {
    if (/Cerrar sesi/i.test(el.textContent)) {
      el.addEventListener('click', function (e) { e.preventDefault(); CB.logout(); });
    }
  });

  var btnMonitor = document.getElementById('btn-monitor');
  if (btnMonitor) {
    btnMonitor.addEventListener('click', function () {
      window.location.href = '../Mesero/Monitor_mesero.html';
    });
  }

  document.querySelectorAll('main button').forEach(function (btn) {
    var t = btn.textContent;
    if (/Libre|Ocupada|Añadir pedido|Para Llevar/i.test(t)) {
      btn.style.cursor = 'pointer';
      btn.addEventListener('click', function () {
        window.location.href = '../Mesero/carta_pedido.html';
      });
    }
  });
})();
</script>
