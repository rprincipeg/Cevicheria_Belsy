<!DOCTYPE html><html lang="es"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Cevicheria Belsy - Carta / Tomar Pedido</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; }
        /* Sidebar: oculto en móvil por defecto, siempre visible en desktop */
        #pane-pedido { display: none; flex-direction: column; }
        @media (min-width: 768px) { #pane-pedido { display: flex; } }
        #pane-pedido.mobile-show { display: flex; }
        /* Panel carta: oculto en móvil cuando se muestra el pedido */
        @media (max-width: 767px) { #pane-carta.mobile-hide { display: none; } }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary-container": "#1e40af", "primary": "#00288e", "outline-variant": "#c4c5d5",
                "surface-container-low": "#f0f4f8", "on-primary-fixed-variant": "#173bab",
                "on-primary-fixed": "#001453", "on-surface": "#171c1f", "on-primary": "#ffffff",
                "secondary": "#006a61", "on-background": "#171c1f", "tertiary-container": "#872d00",
                "surface-container": "#eaeef2", "on-surface-variant": "#444653", "surface": "#f6fafe",
                "surface-container-high": "#e4e9ed", "background": "#f6fafe",
                "surface-container-lowest": "#ffffff", "surface-variant": "#dfe3e7",
                "on-secondary-fixed": "#00201d", "secondary-fixed-dim": "#6bd8cb",
                "on-tertiary-container": "#ffa582", "tertiary-fixed": "#ffdbce",
                "on-tertiary-fixed-variant": "#7f2b00", "secondary-container": "#86f2e4",
                "outline": "#757684", "surface-tint": "#3755c3", "on-tertiary": "#ffffff",
                "on-secondary": "#ffffff", "tertiary": "#611e00", "on-primary-container": "#a8b8ff",
                "error": "#ba1a1a", "error-container": "#ffdad6", "on-error-container": "#93000a",
                "on-error": "#ffffff"
              },
              borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
              spacing: { "touch-target-min": "48px", "container-max-width": "1280px", "margin": "32px", "unit": "8px", "gutter": "24px" },
              fontFamily: { "headline-md": ["Inter"], "label-md": ["Inter"], "body-lg": ["Inter"], "display-lg": ["Inter"], "headline-lg": ["Inter"], "body-md": ["Inter"], "label-lg": ["Inter"] },
              fontSize: {
                "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                "label-md": ["12px", { lineHeight: "16px", fontWeight: "500" }],
                "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                "display-lg": ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "700" }],
                "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
                "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                "label-lg": ["14px", { lineHeight: "20px", fontWeight: "600" }]
              }
            }
          }
        }
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="../Login/js/auth.js"></script>
</head>
<body class="bg-background text-on-background h-screen overflow-hidden flex flex-col antialiased">
    <!-- TopNavBar -->
    <header class="flex justify-between items-center w-full px-4 md:px-margin py-2 md:py-4 h-touch-target-min bg-surface shadow-sm flex-shrink-0 relative z-10">
        <div class="flex items-center gap-2 md:gap-4 min-w-0">
            <button id="btn-back" class="flex items-center gap-1 md:gap-2 text-on-surface-variant hover:bg-surface-container-high transition-colors px-2 md:px-4 py-2 rounded-lg h-touch-target-min shrink-0">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="font-label-lg text-label-lg hidden sm:inline">Volver al mapa de mesas</span>
            </button>
            <div class="h-6 w-px bg-outline-variant mx-1 md:mx-2 hidden sm:block"></div>
            <h1 class="font-headline-md text-headline-md text-primary truncate text-sm md:text-[24px]" id="page-title">Mesa — Tomar pedido</h1>
        </div>
        <div class="flex items-center gap-2 md:gap-4 shrink-0">
            <div class="hidden md:flex items-center gap-2 px-4">
                <span class="font-body-md text-body-md text-on-surface-variant" id="user-label">Mesero</span>
            </div>
            <button id="btn-logout" class="text-error hover:bg-error-container hover:text-on-error-container transition-colors px-2 md:px-4 py-2 rounded-lg font-label-lg text-label-lg h-touch-target-min flex items-center gap-1 md:gap-2">
                <span class="material-symbols-outlined">logout</span>
                <span class="hidden sm:inline">Cerrar sesión</span>
            </button>
        </div>
    </header>

    <!-- Pestañas móvil (solo visible en pantallas pequeñas) -->
    <div class="md:hidden flex border-b border-surface-variant shrink-0 bg-surface" id="mobile-tabs">
        <button id="tab-carta" class="flex-1 py-3 font-label-lg text-label-lg text-primary border-b-2 border-primary">Carta</button>
        <button id="tab-pedido" class="flex-1 py-3 font-label-lg text-label-lg text-on-surface-variant border-b-2 border-transparent flex items-center justify-center gap-2">
            Pedido
            <span id="tab-badge" class="hidden bg-primary text-on-primary rounded-full px-2 py-0.5 text-[11px] font-bold leading-none">0</span>
        </button>
    </div>

    <div class="flex flex-1 overflow-hidden flex-col md:flex-row">
        <!-- Panel carta -->
        <main class="flex-1 flex flex-col bg-surface-container-low overflow-hidden min-h-0" id="pane-carta">
            <!-- Category Tabs -->
            <div class="px-4 md:px-margin py-unit flex-shrink-0 bg-surface shadow-sm z-10 overflow-x-auto">
                <div id="category-tabs" class="flex items-center gap-gutter min-w-max">
                    <span class="font-label-md text-on-surface-variant px-4 py-3">Cargando categorías...</span>
                </div>
            </div>
            <!-- Menu Items Grid -->
            <div class="flex-1 overflow-y-auto p-4 md:p-margin">
                <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-gutter">
                </div>
            </div>
        </main>

        <!-- Panel pedido (sidebar) -->
        <aside class="w-full md:w-96 bg-surface shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-20 flex-col border-l border-surface-variant flex-1 md:flex-none" id="pane-pedido">
            <div class="p-4 border-b border-surface-variant bg-surface-container-lowest">
                <h2 class="font-headline-lg text-headline-lg text-on-surface flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">receipt_long</span>
                    Pedido Actual
                </h2>
                <p class="font-body-md text-body-md text-on-surface-variant" id="sidebar-subtitle">Mesa</p>
                <!-- Takeaway toggle (solo para pedidos en mesa) -->
                <label id="takeaway-toggle-wrap" class="flex items-center gap-2 cursor-pointer group mt-3 p-2 bg-surface-container-low rounded-lg border border-surface-variant hidden">
                    <div class="relative">
                        <input id="takeaway-toggle" class="sr-only peer" type="checkbox">
                        <div class="w-10 h-6 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </div>
                    <span class="font-label-md text-label-md text-on-surface flex items-center gap-1">
                        <span class="material-symbols-outlined text-[16px]">takeout_dining</span>
                        Todo el pedido "Para llevar"
                    </span>
                </label>
                <textarea id="order-notes" class="mt-3 w-full text-sm bg-surface-container border border-surface-variant rounded-lg p-2 font-body-md text-on-surface resize-none focus:outline-none focus:ring-1 focus:ring-primary" rows="2" placeholder="Notas del pedido (opcional)..."></textarea>
            </div>

            <!-- Ítems existentes (mesa ocupada) -->
            <div id="existing-section" class="hidden flex-shrink-0 border-b border-surface-variant">
                <div class="px-4 pt-3 pb-1 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary" style="font-size:18px">receipt_long</span>
                    <span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Ítems del pedido</span>
                </div>
                <div id="existing-items-list" class="px-4 pb-3 space-y-1 max-h-44 overflow-y-auto"></div>
                <div class="px-4 pt-2 pb-2 flex items-center gap-2 border-t border-dashed border-outline-variant">
                    <span class="material-symbols-outlined text-primary" style="font-size:18px">add_circle</span>
                    <span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Nuevos ítems</span>
                </div>
            </div>

            <!-- Ítems del carrito -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="cart-items">
                <div class="text-center py-8 text-on-surface-variant font-body-md" id="cart-empty">
                    <span class="material-symbols-outlined text-4xl block mb-2">shopping_cart</span>
                    Ningún ítem agregado aún
                </div>
            </div>

            <!-- Totales y acción -->
            <div class="p-4 border-t border-surface-variant bg-surface-container-lowest">
                <div class="space-y-2 mb-4">
                    <div class="flex justify-between text-on-surface-variant font-body-md text-body-md">
                        <span id="cart-count-label">0 ítems</span>
                        <span id="cart-subtotal">S/ 0.00</span>
                    </div>
                    <div class="flex justify-between text-on-surface font-headline-md text-headline-md text-xl border-t border-surface-variant pt-2">
                        <span>Total</span>
                        <span id="cart-total">S/ 0.00</span>
                    </div>
                </div>
                <button id="btn-confirm" class="w-full h-[56px] bg-[#d97706] hover:bg-[#b45309] text-white rounded-xl font-label-lg text-label-lg shadow-md flex items-center justify-center gap-2 transition-all" disabled>
                    <span class="material-symbols-outlined">send</span>
                    Confirmar pedido
                </button>
            </div>
        </aside>
    </div>

<script>
(function () {
  if (!CB.protectPage(['mesero', 'admin'])) return;

  var sess = CB.getSession();
  var userLabel = document.getElementById('user-label');
  if (sess && userLabel) userLabel.textContent = sess.usuario || (sess.rol.charAt(0).toUpperCase() + sess.rol.slice(1));

  document.getElementById('btn-logout').addEventListener('click', function () { CB.logout(); });
  document.getElementById('btn-back').addEventListener('click', function () {
    window.location.href = '../Mesero/Mapa_mesas.html';
  });

  // ---- URL params ----
  var params = new URLSearchParams(window.location.search);
  var tableId = params.get('tableId') ? parseInt(params.get('tableId'), 10) : null;
  var tableNumber = params.get('tableNumber');
  var existingOrderId = params.get('orderId') || null;
  var isTakeaway = params.get('isTakeaway') === 'true';

  // Título y subtítulo
  var pageTitle = document.getElementById('page-title');
  var sidebarSubtitle = document.getElementById('sidebar-subtitle');
  if (isTakeaway) {
    pageTitle.textContent = 'Para Llevar — Tomar pedido';
    sidebarSubtitle.textContent = 'Para llevar';
  } else if (tableNumber) {
    pageTitle.textContent = 'Mesa ' + tableNumber + (existingOrderId ? ' — Añadir ítems' : ' — Tomar pedido');
    sidebarSubtitle.textContent = 'Mesa ' + tableNumber;
  }

  // Toggle para llevar (solo pedidos en mesa)
  if (!isTakeaway && tableId) {
    document.getElementById('takeaway-toggle-wrap').classList.remove('hidden');
  }

  // ---- Pestañas móvil ----
  var tabCarta = document.getElementById('tab-carta');
  var tabPedido = document.getElementById('tab-pedido');
  var tabBadge = document.getElementById('tab-badge');
  var paneCarta = document.getElementById('pane-carta');
  var panePedido = document.getElementById('pane-pedido');

  function showTab(tab) {
    if (tab === 'carta') {
      paneCarta.classList.remove('mobile-hide');
      panePedido.classList.remove('mobile-show');
      tabCarta.className = 'flex-1 py-3 font-label-lg text-label-lg text-primary border-b-2 border-primary';
      tabPedido.className = 'flex-1 py-3 font-label-lg text-label-lg text-on-surface-variant border-b-2 border-transparent flex items-center justify-center gap-2';
    } else {
      paneCarta.classList.add('mobile-hide');
      panePedido.classList.add('mobile-show');
      tabPedido.className = 'flex-1 py-3 font-label-lg text-label-lg text-primary border-b-2 border-primary flex items-center justify-center gap-2';
      tabCarta.className = 'flex-1 py-3 font-label-lg text-label-lg text-on-surface-variant border-b-2 border-transparent';
    }
  }

  if (tabCarta) tabCarta.addEventListener('click', function () { showTab('carta'); });
  if (tabPedido) tabPedido.addEventListener('click', function () { showTab('pedido'); });

  function updateTabBadge(count) {
    if (!tabBadge) return;
    if (count > 0) { tabBadge.classList.remove('hidden'); tabBadge.textContent = count; }
    else { tabBadge.classList.add('hidden'); }
  }

  // ---- API helper ----
  function apiReq(method, path, body) {
    var token = sessionStorage.getItem(CB.CONFIG.STORAGE_KEY_TOKEN);
    var opts = { method: method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } };
    if (body) opts.body = JSON.stringify(body);
    return fetch(CB.CONFIG.API_BASE + path, opts).then(function (r) {
      return r.json().then(function (data) { return { ok: r.ok, data: data }; });
    });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ---- Categorías ----
  var categories = [];
  var activeCategoryId = null;

  function renderTabs() {
    var container = document.getElementById('category-tabs');
    container.innerHTML = '';
    categories.forEach(function (cat) {
      var btn = document.createElement('button');
      var isActive = cat.id === activeCategoryId;
      btn.className = 'flex flex-col items-center gap-1 px-4 py-3 border-b-2 ' +
        (isActive ? 'border-primary text-primary' : 'border-transparent text-on-surface-variant hover:text-primary hover:bg-surface-container-high rounded-t-lg') +
        ' transition-colors h-touch-target-min font-label-lg text-label-lg';
      btn.textContent = cat.name;
      btn.addEventListener('click', function () { activeCategoryId = cat.id; renderTabs(); renderItems(); });
      container.appendChild(btn);
    });
  }

  // ---- Carrito ----
  var cart = [];

  function cartTotal() { return cart.reduce(function (s, c) { return s + c.price * c.quantity; }, 0); }
  function cartCount() { return cart.reduce(function (s, c) { return s + c.quantity; }, 0); }

  function getGlobalTakeaway() {
    return isTakeaway || (document.getElementById('takeaway-toggle') ? document.getElementById('takeaway-toggle').checked : false);
  }

  function renderCart() {
    var container = document.getElementById('cart-items');
    var emptyMsg = document.getElementById('cart-empty');
    var confirmBtn = document.getElementById('btn-confirm');
    var countLabel = document.getElementById('cart-count-label');
    var subtotalEl = document.getElementById('cart-subtotal');
    var totalEl = document.getElementById('cart-total');
    var globalTakeaway = getGlobalTakeaway();

    Array.from(container.querySelectorAll('.cart-item')).forEach(function (el) { el.remove(); });

    if (cart.length === 0) {
      emptyMsg.classList.remove('hidden');
    } else {
      emptyMsg.classList.add('hidden');
      cart.forEach(function (item) {
        var div = document.createElement('div');
        div.className = 'cart-item bg-surface-container-lowest p-3 rounded-xl border border-surface-variant shadow-sm flex flex-col gap-2';
        var effectiveTakeaway = globalTakeaway || item.isTakeaway;
        var takeawayRow = '';
        if (!isTakeaway) {
          var toggleId = 'itogo-' + item.menuItemId;
          takeawayRow =
            '<label class="flex items-center gap-2 cursor-pointer w-max">' +
              '<div class="relative">' +
                '<input id="' + toggleId + '" class="sr-only peer item-togo-check" type="checkbox" data-item-id="' + escHtml(item.menuItemId) + '"' + (effectiveTakeaway ? ' checked' : '') + '>' +
                '<div class="w-10 h-6 bg-surface-container-high rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[\'\'] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>' +
              '</div>' +
              '<span class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">' +
                '<span class="material-symbols-outlined text-[16px]">takeout_dining</span>Para llevar' +
              '</span>' +
            '</label>';
        }
        div.innerHTML =
          '<div class="flex justify-between items-start gap-2">' +
            '<div class="flex-1 min-w-0">' +
              '<h4 class="font-label-lg text-label-lg text-on-surface mb-0.5">' + escHtml(item.name) + '</h4>' +
              '<span class="font-label-md text-label-md text-on-surface-variant">S/ ' + item.price.toFixed(2) + ' c/u</span>' +
            '</div>' +
            '<div class="flex items-start gap-1 shrink-0">' +
              '<span class="font-headline-md text-headline-md text-on-surface text-base">S/ ' + (item.price * item.quantity).toFixed(2) + '</span>' +
              '<button class="h-8 w-8 rounded-full flex items-center justify-center text-error hover:bg-error-container transition-colors" data-remove="' + escHtml(item.menuItemId) + '">' +
                '<span class="material-symbols-outlined text-[18px]">delete</span>' +
              '</button>' +
            '</div>' +
          '</div>' +
          '<div class="flex items-center">' +
            '<div class="flex items-center bg-surface-container-low rounded-lg p-1 border border-surface-variant">' +
              '<button class="h-8 w-8 rounded flex items-center justify-center text-on-surface hover:bg-surface-variant" data-dec="' + escHtml(item.menuItemId) + '">' +
                '<span class="material-symbols-outlined text-sm">remove</span>' +
              '</button>' +
              '<span class="font-label-lg text-label-lg w-8 text-center">' + item.quantity + '</span>' +
              '<button class="h-8 w-8 rounded flex items-center justify-center text-on-surface hover:bg-surface-variant" data-inc="' + escHtml(item.menuItemId) + '">' +
                '<span class="material-symbols-outlined text-sm">add</span>' +
              '</button>' +
            '</div>' +
          '</div>' +
          takeawayRow;
        container.appendChild(div);
      });

      container.querySelectorAll('[data-remove]').forEach(function (btn) {
        btn.addEventListener('click', function () { removeFromCart(btn.dataset.remove); });
      });
      container.querySelectorAll('[data-dec]').forEach(function (btn) {
        btn.addEventListener('click', function () { changeQty(btn.dataset.dec, -1); });
      });
      container.querySelectorAll('[data-inc]').forEach(function (btn) {
        btn.addEventListener('click', function () { changeQty(btn.dataset.inc, 1); });
      });
      if (!isTakeaway) {
        container.querySelectorAll('.item-togo-check').forEach(function (chk) {
          chk.addEventListener('change', function () {
            var cartItem = cart.find(function (c) { return c.menuItemId === chk.dataset.itemId; });
            if (cartItem) cartItem.isTakeaway = chk.checked;
          });
        });
      }
    }

    var total = cartTotal();
    var count = cartCount();
    countLabel.textContent = count + (count === 1 ? ' ítem' : ' ítems');
    subtotalEl.textContent = 'S/ ' + total.toFixed(2);
    totalEl.textContent = 'S/ ' + total.toFixed(2);
    confirmBtn.disabled = cart.length === 0;
    confirmBtn.classList.toggle('opacity-50', cart.length === 0);
    confirmBtn.classList.toggle('cursor-not-allowed', cart.length === 0);
    updateTabBadge(count);
  }

  function addToCart(item) {
    var existing = cart.find(function (c) { return c.menuItemId === item.id; });
    if (existing) { existing.quantity++; }
    else { cart.push({ menuItemId: item.id, name: item.name, price: Number(item.price), quantity: 1, isTakeaway: getGlobalTakeaway() }); }
    renderCart();
    renderItems();
  }

  function removeFromCart(menuItemId) {
    cart = cart.filter(function (c) { return c.menuItemId !== menuItemId; });
    renderCart();
    renderItems();
  }

  function changeQty(menuItemId, delta) {
    var item = cart.find(function (c) { return c.menuItemId === menuItemId; });
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) removeFromCart(menuItemId);
    else { renderCart(); renderItems(); }
  }

  // ---- Ítems del menú ----
  function renderItems() {
    var cat = categories.find(function (c) { return c.id === activeCategoryId; });
    var grid = document.getElementById('menu-grid');
    grid.innerHTML = '';
    if (!cat) return;
    cat.items.forEach(function (item) {
      var qtyInCart = (cart.find(function (c) { return c.menuItemId === item.id; }) || {}).quantity || 0;
      var card = document.createElement('div');
      card.className = 'bg-surface rounded-xl shadow-sm border border-surface-variant overflow-hidden flex flex-col';
      card.innerHTML =
        '<div class="h-36 md:h-40 w-full relative bg-surface-container-high">' +
          (item.imageUrl
            ? '<img alt="' + escHtml(item.name) + '" class="w-full h-full object-cover" src="' + escHtml(item.imageUrl) + '">'
            : '<div class="w-full h-full flex items-center justify-center text-outline-variant"><span class="material-symbols-outlined text-4xl">restaurant</span></div>') +
          '<div class="absolute top-2 right-2 bg-secondary text-on-secondary px-3 py-1 rounded-full font-label-md text-label-md shadow-sm">Disponible</div>' +
        '</div>' +
        '<div class="p-4 flex flex-col flex-1">' +
          '<div class="flex justify-between items-start mb-2">' +
            '<h3 class="font-label-lg text-label-lg text-on-surface leading-tight">' + escHtml(item.name) + '</h3>' +
            '<span class="font-label-lg text-label-lg text-primary shrink-0 ml-2">S/ ' + Number(item.price).toFixed(2) + '</span>' +
          '</div>' +
          (item.description ? '<p class="font-label-md text-label-md text-on-surface-variant mb-3 flex-1">' + escHtml(item.description) + '</p>' : '<div class="flex-1 mb-3"></div>') +
          '<div class="flex items-center justify-between mt-auto">' +
            '<button class="h-touch-target-min w-touch-target-min rounded-lg ' + (qtyInCart > 0 ? 'bg-surface-container-high text-on-surface hover:bg-surface-variant' : 'bg-surface-container text-outline-variant opacity-50 cursor-not-allowed') + ' flex items-center justify-center transition-colors" ' + (qtyInCart === 0 ? 'disabled' : '') + ' data-dec-item="' + escHtml(item.id) + '">' +
              '<span class="material-symbols-outlined">remove</span>' +
            '</button>' +
            '<span class="font-headline-md text-headline-md w-8 text-center ' + (qtyInCart > 0 ? 'text-on-surface' : 'text-on-surface-variant') + '">' + qtyInCart + '</span>' +
            '<button class="h-touch-target-min w-touch-target-min rounded-lg bg-primary text-on-primary flex items-center justify-center hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm" data-add-item="' + escHtml(item.id) + '">' +
              '<span class="material-symbols-outlined">add</span>' +
            '</button>' +
          '</div>' +
        '</div>';
      card.querySelector('[data-add-item]').addEventListener('click', function () { addToCart(item); });
      var decBtn = card.querySelector('[data-dec-item]');
      if (decBtn && !decBtn.disabled) decBtn.addEventListener('click', function () { changeQty(item.id, -1); });
      grid.appendChild(card);
    });
  }

  // ---- Carga de categorías ----
  function loadCategories() {
    apiReq('GET', '/menu/categories').then(function (res) {
      if (!res.ok) { CB.debug('Error cargando carta:', res.data); return; }
      categories = res.data;
      if (categories.length > 0) activeCategoryId = categories[0].id;
      renderTabs();
      renderItems();
    }).catch(function (err) { CB.debug('Error de red:', err); });
  }

  loadCategories();

  // ---- Toggle global para llevar ----
  var takeawayToggle = document.getElementById('takeaway-toggle');
  if (takeawayToggle) {
    takeawayToggle.addEventListener('change', function () {
      var checked = this.checked;
      cart.forEach(function (item) { item.isTakeaway = checked; });
      renderCart();
    });
  }

  // ---- Ítems del pedido existente (mesa ocupada) ----
  function renderExistingItems(items) {
    var section = document.getElementById('existing-section');
    var list = document.getElementById('existing-items-list');
    if (!items || items.length === 0) { section.classList.add('hidden'); return; }
    section.classList.remove('hidden');
    list.innerHTML = '';
    items.forEach(function (item) {
      var div = document.createElement('div');
      div.className = 'flex items-center gap-1.5 py-1';
      div.innerHTML =
        '<span class="font-label-lg text-label-lg text-on-surface truncate flex-1">' + escHtml(item.menuItem.name) + '</span>' +
        '<span class="font-label-md text-label-md text-on-surface-variant shrink-0">×' + item.quantity + '</span>';
      list.appendChild(div);
    });
    var emptyMsg = document.getElementById('cart-empty');
    if (emptyMsg) emptyMsg.innerHTML =
      '<span class="material-symbols-outlined text-4xl block mb-2">add_shopping_cart</span>Selecciona ítems para añadir al pedido';
  }

  function loadExistingOrder() {
    if (!existingOrderId) return;
    apiReq('GET', '/orders/' + existingOrderId).then(function (res) {
      if (!res.ok) { CB.debug('Error cargando pedido existente:', res.data); return; }
      renderExistingItems(res.data.items || []);
    }).catch(function (err) { CB.debug('Error al cargar pedido:', err); });
  }

  loadExistingOrder();

  if (CB.socket) {
    CB.socket.emit('join:room', 'waiters');
    if (existingOrderId) {
      CB.socket.on('orders:updated', function () { loadExistingOrder(); });
    }
  }

  // ---- Confirmar pedido ----
  document.getElementById('btn-confirm').addEventListener('click', function () {
    if (cart.length === 0) return;
    var globalTakeaway = getGlobalTakeaway();
    var items = cart.map(function (c) {
      return { menuItemId: c.menuItemId, quantity: c.quantity, isTakeaway: globalTakeaway || c.isTakeaway };
    });
    var notes = document.getElementById('order-notes').value.trim() || undefined;

    var req;
    if (existingOrderId) {
      var addBody = { items: items };
      if (notes) addBody.notes = notes;
      req = apiReq('POST', '/orders/' + existingOrderId + '/items', addBody);
    } else {
      var body = { isTakeaway: globalTakeaway, items: items };
      if (notes) body.notes = notes;
      if (tableId !== null) body.tableId = tableId;
      req = apiReq('POST', '/orders', body);
    }

    var btn = document.getElementById('btn-confirm');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span> Enviando...';

    req.then(function (res) {
      if (!res.ok) {
        alert('Error: ' + (res.data.error || 'No se pudo confirmar el pedido'));
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">send</span> Confirmar pedido';
        return;
      }
      window.location.href = '../Mesero/Mapa_mesas.html';
    }).catch(function () {
      alert('Error de conexión. Inténtalo de nuevo.');
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined">send</span> Confirmar pedido';
    });
  });
})();
</script>
</body></html>
