[build]
builder = "nixpacks"
# --include=dev fuerza la instalación de devDependencies (@types/*, typescript, prisma)
# aunque NODE_ENV=production; son necesarias para compilar (tsc) y generar Prisma.
buildCommand = "cd server && npm install --include=dev && npx prisma generate && npm run build"

[deploy]
startCommand = "cd server && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
